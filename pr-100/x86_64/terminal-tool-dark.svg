279" lengthAdjust="spacing" xml:space="preserve">  cwd: ~/src/allowlister-remote</text><text x="22" y="385" fill="#d6dae4" textLength="450" lengthAdjust="spacing" xml:space="preserve">Approve here or in the web app. [a]llow / [d]eny: </text><rect x="472" y="373" width="9" height="18" fill="#d6dae4" opacity="0.75"/></svg>
