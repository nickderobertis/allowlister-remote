# screencomp configuration. See https://github.com/nickderobertis/screencomp.

[capture]
# CPU architectures you maintain screenshots for. Captures run in a Linux
# container, so only the arch varies. Each entry has its own committed baseline
# (shots/baseline/<arch>.json) and gets a CI capture lane; local commands
# default to your host arch and require it to be listed here. Add an arch (e.g.
# "x86_64") to support it — note every entry adds a CI job to each run.
arches = ["x86_64"]

[comment]
title = "Visual changes"
marker = "screencomp"        # [A-Za-z0-9_-]; one sticky comment per marker
embed_limit = 10             # embed images inline when <= N shots differ (0 disables)

# Toggle dimensions the gallery renders controls for. A shot's `toggles` in
# captures.json reference these keys, so each screen is one card you toggle
# through its viewports instead of a separate card per size. The first value is
# the gallery default. We capture every state at both desktop and mobile.
[[toggle]]
key = "viewport"
label = "Viewport"
values = ["desktop", "mobile"]

# Light/dark is captured for every screen too. The app follows the OS setting
# automatically (see src/lib/theme.tsx); captures drive prefers-color-scheme so
# each state is recorded in both themes. First value is the gallery default.
[[toggle]]
key = "theme"
label = "Theme"
values = ["dark", "light"]

[guard]
# Local pre-push guard (.githooks/pre-push): re-capture only when these globs
# change. Adjust to the files that actually affect your screenshots.
paths = [
  "apps/web/app/**",
  "apps/web/src/**",
  "apps/web/public/**",
  "apps/web/screenshots/**",
  "apps/web/playwright.capture.config.ts",
  # The terminal lane renders the plugin's real /dev/tty prompt: re-capture when
  # the prompt source, the recorded fixture, or the SVG renderer changes.
  "crates/allowlister-remote-plugin/src/**",
  "scripts/terminal-svg.mjs",
  "**/*.{css,scss,html}",
]
gallery = "shots/review"
