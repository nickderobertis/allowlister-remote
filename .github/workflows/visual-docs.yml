# Visual docs via screencomp's reusable workflow. The capture step stays yours;
# screencomp owns the classify gate, gallery, GitHub Pages deploy, and the sticky
# before/after PR comment. See the screencomp README ("GitHub Action").
#
# Which CPU arch(es) CI captures is read from [capture].arches in screencomp.toml
# — one capture lane per arch, each on a matching runner. Add an arch there to
# gain a lane.
name: Visual docs

on:
  pull_request:
    # `closed` lets screencomp delete this PR's gh-pages preview once it closes,
    # so stale /pr-<n>/ galleries do not accumulate on the branch.
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [main]
  workflow_dispatch:
    # On-demand canonical redeploy. A push to main only redeploys the canonical
    # gallery if its visual-docs run runs to completion, but a run can be
    # superseded when several merges land in quick succession (e.g. a release
    # burst), leaving the deployed /<arch>/ gallery a commit or two behind main.
    # Dispatching this workflow on main recaptures and redeploys the canonical
    # gallery without waiting for the next push. Non-PR event, so the concurrency
    # rule below queues it rather than cancelling it.
  schedule:
    # Monthly: prune the gh-pages gallery history so the committed PNGs do not grow
    # the branch without bound. Keeps the 20 most recent versions by default (see
    # `gh-pages-history-versions` below). Adjust or drop freely.
    - cron: "27 4 1 * *"

permissions:
  contents: write       # push the gh-pages gallery
  pull-requests: write  # post the diff comment

jobs:
  visual-docs:
    uses: nickderobertis/screencomp/.github/workflows/visual-docs-reusable.yml@v0.4.2
    with:
      # Pin the screencomp CLI too: the reusable workflow's internal composite
      # actions float on the `@v0` major tag, so pinning only the workflow ref
      # still let the v0.4.2 CLI roll in unannounced. Pinning the version here
      # keeps the gate's behaviour fixed until we deliberately bump it.
      screencomp-version: v0.4.2
      # Strict gate (the safe default): CI FAILS if the capture drifts from the
      # committed baseline. Regenerate the baseline locally with the pre-push
      # guard (.githooks/pre-push) and commit it. To switch to CI auto-accept
      # instead, set `fail-on-drift: false` and `update-manifest: true` (and wire
      # `push-token` under `secrets:` so the bot's manifest push can trigger CI).
      fail-on-drift: true
      # Keep the gh-pages gallery bounded (the safe default): delete this PR's
      # preview when it closes and prune gh-pages history on the schedule below.
      # The `closed` PR type and the `schedule:` trigger above are what let these
      # run. Set false to opt out (e.g. you serve Pages from somewhere other than
      # the gh-pages branch).
      gh-pages-maintenance: true
      # Most recent gallery versions (gh-pages commits) the scheduled prune keeps
      # intact; older history is collapsed into one base commit. Default 20; set 0
      # to collapse to a single commit.
      gh-pages-history-versions: 20
      # Capture writes $SHOTS_OUT/captures.json plus the PNGs it references
      # ($SHOTS_OUT is exported as shots/current/<arch> per lane).
      # playwright.capture.config.ts renders the demo PWA deterministically and
      # the capture script emits the index — each shot's name, its `viewport`
      # toggle (desktop/mobile), content hash, and image path. The browser
      # install matches the @playwright/test version in package.json rather than
      # the container's bundled one.
      capture-command: |
        # Log the runner's CPU model. ubuntu-latest hands out heterogeneous
        # CPUs across runs, and rendering must be byte-identical regardless; this
        # line records which microarchitecture a given capture ran on so a green
        # gate across re-runs visibly samples different CPUs. Renders no bytes.
        echo "runner CPU: $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2- | sed 's/^ *//')"
        npm ci
        npx playwright install --with-deps chromium
        npx next build apps/web
        npx playwright test --config apps/web/playwright.capture.config.ts
