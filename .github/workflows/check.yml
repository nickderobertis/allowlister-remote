name: check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    # The affected lanes (build + nx -t test/test-e2e) finish well inside ~15 min;
    # cap the job so a wedged test or runner fails fast and is retryable instead
    # of sitting for the default 6h.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: extractions/setup-just@v3
      - name: Install allowlister
        # Authenticate the install script's "resolve latest" GitHub API call:
        # unauthenticated it is rate-limited (HTTP 403/504) on shared CI IPs.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: curl -fsSL https://raw.githubusercontent.com/nickderobertis/allowlister/main/scripts/install.sh | bash -s -- --bin-dir /usr/local/bin
      - run: rustup component add clippy
      - run: just bootstrap
      - run: npx playwright install --with-deps chromium
      - name: Run affected check
        env:
          NX_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          NX_HEAD: ${{ github.sha }}
        run: just check

  install-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cargo build --release -p allowlister-remote-plugin -p allowlister-remote-daemon
      - run: npx nx run web:build
      - name: Stage native binaries into platform package
        run: |
          mkdir -p packages/allowlister-remote-plugin-linux-x64/bin
          cp target/release/allowlister-remote-plugin packages/allowlister-remote-plugin-linux-x64/bin/allowlister-remote-plugin
          cp target/release/allowlister-remote-daemon packages/allowlister-remote-plugin-linux-x64/bin/allowlister-remote-daemon
          chmod +x packages/allowlister-remote-plugin-linux-x64/bin/allowlister-remote-plugin packages/allowlister-remote-plugin-linux-x64/bin/allowlister-remote-daemon
      - name: Smoke-test npm install path
        run: npm run release:smoke-npm
