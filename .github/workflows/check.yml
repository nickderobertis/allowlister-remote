name: check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: extractions/setup-just@v3
      - name: Install allowlister
        run: curl -fsSL https://raw.githubusercontent.com/nickderobertis/allowlister/main/scripts/install.sh | bash -s -- --bin-dir /usr/local/bin
      - run: just bootstrap
      - run: npx playwright install --with-deps chromium
      - run: just check

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cargo build --release --bin allowlister-remote-plugin
      - run: npm run build
      - name: Smoke-test Rust plugin static no-wait path
        run: |
          printf '{"current_verdict":"allow","command":"git status","cwd":"/tmp"}' \
            | ./target/release/allowlister-remote-plugin --server-url http://127.0.0.1:9 \
            | tee /tmp/plugin.json
          grep '"verdict":"defer"' /tmp/plugin.json
