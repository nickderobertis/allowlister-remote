name: check

on:
  pull_request:
  push:
    # TEMP: claude/macos-e2e-setup-kv45ey runs the full matrix on direct pushes
    # because pull_request CI is suppressed for this bot-authored PR. Remove before merge.
    branches: [main, claude/macos-e2e-setup-kv45ey]

concurrency:
  group: check-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # PRs run Linux only to keep CI minutes cheap; push to main runs the full
  # cross-platform matrix so macOS/Windows regressions are caught before release.
  setup:
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.pick.outputs.os }}
    steps:
      - id: pick
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo 'os=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'os=["ubuntu-latest","macos-14","windows-latest"]' >> "$GITHUB_OUTPUT"
          fi

  check:
    name: check (${{ matrix.os }})
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.setup.outputs.os) }}
    # The affected lanes (build + nx -t test/test-e2e) finish well inside ~15 min;
    # cap the job so a wedged test or runner fails fast and is retryable instead
    # of sitting for the default 6h. Lowered to 20 while diagnosing the test-lane hang.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: extractions/setup-just@v3
      - name: Install allowlister
        shell: bash
        env:
          # Authenticate the install script's "resolve latest" GitHub API call so
          # shared runner IPs (notably macOS) don't hit the unauthenticated limit.
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/nickderobertis/allowlister/main/scripts/install.sh \
            | bash -s -- --bin-dir "$HOME/.allowlister/bin"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cygpath -w "$HOME/.allowlister/bin" >> "$GITHUB_PATH"
          else
            echo "$HOME/.allowlister/bin" >> "$GITHUB_PATH"
          fi
      - run: rustup component add clippy
      - run: just bootstrap
      - name: Install Playwright browser (Linux)
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright browser (macOS/Windows)
        if: runner.os != 'Linux'
        run: npx playwright install chromium
      - name: Resolve affected base
        shell: bash
        run: |
          # PRs compare against the PR base; pushes against the prior commit. Fall
          # back to the merge-base with origin/main when "before" is unset/zeroed/
          # unreachable (branch creation or force-push), so nx affected never fails
          # to resolve its base.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
            zero="0000000000000000000000000000000000000000"
            if [[ -z "$base" || "$base" == "$zero" ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
              git fetch --no-tags origin main >/dev/null 2>&1 || true
              base="$(git merge-base origin/main HEAD)"
            fi
          fi
          echo "NX_BASE=$base" >> "$GITHUB_ENV"
          echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
      # TEMP diagnostic: the `test` lane passes on macOS, so the ~28 min hang is
      # in a later `just check` lane. Run those post-test lanes serially
      # (--parallel=1) with live streamed, name-prefixed output, so the hanging
      # task is the last to start and never finish. shell: bash so Windows does
      # not default to pwsh (where $NX_BASE/$NX_HEAD would not expand).
      # Reverted once the culprit is fixed.
      - name: Run affected check (TEMP diagnostic — isolate the hang)
        shell: bash
        run: npx nx affected -t fmt-check lint lint-compiler typecheck build test-e2e --base "$NX_BASE" --head "$NX_HEAD" --parallel=1 --output-style=stream

  # Aggregate context so branch protection can require a single "check" status
  # regardless of the matrix legs.
  check-required:
    name: check
    runs-on: ubuntu-latest
    needs: check
    if: always()
    steps:
      - name: Verify all matrix legs succeeded
        run: '[ "${{ needs.check.result }}" = "success" ]'

  install-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cargo build --release -p allowlister-remote-plugin -p allowlister-remote-daemon
      - run: npx nx run web:build
      - name: Stage native binaries into platform package
        run: |
          mkdir -p packages/allowlister-remote-plugin-linux-x64/bin
          cp target/release/allowlister-remote-plugin packages/allowlister-remote-plugin-linux-x64/bin/allowlister-remote-plugin
          cp target/release/allowlister-remote-daemon packages/allowlister-remote-plugin-linux-x64/bin/allowlister-remote-daemon
          chmod +x packages/allowlister-remote-plugin-linux-x64/bin/allowlister-remote-plugin packages/allowlister-remote-plugin-linux-x64/bin/allowlister-remote-daemon
      - name: Smoke-test npm install path
        run: npm run release:smoke-npm
