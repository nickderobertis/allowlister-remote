name: e2e-smoke

# Post-publish end-to-end smoke test. Runs after the publish workflow tags a
# release and publishes the packages, then exercises the full browser approval
# flow against the actual plugin package downloaded from the public npm
# registry. Can also be dispatched manually to smoke an already-published
# version.
on:
  workflow_run:
    workflows: [publish]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: Published plugin version to smoke test (defaults to latest on npm)
        required: false
        type: string

permissions:
  contents: read

jobs:
  e2e-smoke:
    # Only run for successful publish runs, or when dispatched manually.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - uses: extractions/setup-just@v3
      - name: Install allowlister
        # Authenticate the install script's "resolve latest" GitHub API call:
        # unauthenticated it is rate-limited (HTTP 403/504) on shared CI IPs.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: curl -fsSL https://raw.githubusercontent.com/nickderobertis/allowlister/main/scripts/install.sh | bash -s -- --bin-dir /usr/local/bin
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build web app
        run: npx nx run web:build
      - name: Resolve published version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          TRIGGER_REF: ${{ github.event.workflow_run.head_branch }}
        run: |
          version="${INPUT_VERSION:-}"
          if [[ -z "$version" && "${TRIGGER_REF:-}" == v* ]]; then
            version="${TRIGGER_REF#v}"
          fi
          if [[ -z "$version" ]]; then
            version="$(npm view @nickderobertis/allowlister-remote-plugin version)"
          fi
          echo "Resolved published version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Install the published broker via its release install script
        # The broker ships on GitHub Releases (not npm), so install the *published*
        # binary with the same cross-platform installer users run — exercising the
        # broker Release artifact, scripts/install-broker.sh, and the tag-stamped
        # --version end to end — instead of building it from source. The realtime
        # e2e spec honors ALLOWLISTER_REMOTE_BROKER_BIN, so point it at the install.
        env:
          # Authenticate the installer's GitHub API access to dodge the shared-runner
          # rate limit (a no-op for the download itself, which uses --version).
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          bin_dir="$RUNNER_TEMP/broker-bin"
          bash scripts/install-broker.sh --version "v${version}" --bin-dir "$bin_dir"
          installed="$("$bin_dir/allowlister-remote-broker" --version)"
          if [[ "$installed" != "$version" ]]; then
            echo "installed broker --version ($installed) != published version ($version)" >&2
            exit 1
          fi
          echo "installed published broker $installed via scripts/install-broker.sh"
          echo "ALLOWLISTER_REMOTE_BROKER_BIN=$bin_dir/allowlister-remote-broker" >> "$GITHUB_ENV"
      - name: Run published-package e2e smoke
        run: npm run release:smoke-e2e -- "${{ steps.version.outputs.version }}"
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-smoke-playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
