name: Performance

# Informational performance suite, gated on Nx affected. The `bench` job runs the
# plugin's Criterion engine benchmarks and hyperfine CLI timings only when the
# plugin is affected; the `web` job runs the PWA's Vitest micro-benchmarks,
# deterministic bundle-size report, and Lighthouse audit only when web is
# affected (the `changes` job resolves this). Each posts its own sticky PR comment
# and a job summary. It is deliberately NOT a quality gate: benchmark timings are
# noisy on shared CI runners, so these jobs report rather than block — keep them
# out of branch-protection's required checks. (The hard, deterministic gate is
# check.yml / `just check`.)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Read the code; write PR comments. The comment step is additionally guarded to
# same-repo PRs below, since fork PRs only ever get a read-only token.
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Affected gate: perf is measured only for the package a PR actually touches,
  # so a web-only change skips the Rust suite and a plugin-only change skips the
  # PWA suite. Non-PR events (push to main, workflow_dispatch) have no base to
  # diff, so they fall through to running both.
  changes:
    name: affected
    runs-on: ubuntu-latest
    outputs:
      plugin: ${{ steps.affected.outputs.plugin }}
      web: ${{ steps.affected.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - id: affected
        env:
          NX_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          NX_HEAD: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ -z "${NX_BASE:-}" || "$NX_BASE" =~ ^0+$ ]]; then
            echo "plugin=true" >> "$GITHUB_OUTPUT"
            echo "web=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          affected="$(npx nx show projects --affected --base "$NX_BASE" --head "$NX_HEAD")"
          echo "affected: $affected"
          grep -qx 'allowlister-remote-plugin' <<<"$affected" \
            && echo "plugin=true" >> "$GITHUB_OUTPUT" || echo "plugin=false" >> "$GITHUB_OUTPUT"
          grep -qx 'web' <<<"$affected" \
            && echo "web=true" >> "$GITHUB_OUTPUT" || echo "web=false" >> "$GITHUB_OUTPUT"

  bench:
    name: benchmarks
    needs: changes
    if: needs.changes.outputs.plugin == 'true'
    # A single, consistent runner: timings are only comparable on the same
    # hardware, so this never matrixes across OSes.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the PR base commit is available for the comparison.
          fetch-depth: 0

      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just,hyperfine,critcmp

      # cachegrind backs the deterministic instruction counts; a system package,
      # not a cargo tool. musl-tools + the musl target let the CLI benches build
      # the static musl binary that actually ships (scripts/bench.sh,
      # bench-instructions.sh default to it), so the startup numbers track the
      # published artifact rather than a glibc dev build.
      - name: Install valgrind and musl toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q valgrind musl-tools
      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      # Fresh baselines every run: rust-cache may carry a stale target/criterion
      # across runs, which would silently corrupt the base-vs-PR comparison.
      - name: Clear stale Criterion baselines
        run: rm -rf target/criterion

      - name: Benchmark this revision (Criterion)
        run: cargo bench --locked -p allowlister-remote-plugin --bench engine -- --measurement-time 3 --save-baseline pr

      - name: Benchmark this revision (hyperfine CLI)
        run: just bench-cli

      # Exact counts, no statistics: these two are the only layers where a small
      # delta is meaningful on a shared runner.
      - name: Allocation counts (deterministic)
        run: |
          mkdir -p target/bench
          just bench-allocs | tee target/bench/allocs.md

      - name: Instruction counts (cachegrind)
        run: just bench-instructions

      # Best effort: the PR base may predate a bench (e.g. the PR that
      # introduces it), so a failure here is expected and non-fatal — the job
      # still reports absolute numbers, just without a regression delta.
      - name: Compare against PR base (Criterion + cachegrind)
        id: basecmp
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          set -euo pipefail
          base='${{ github.event.pull_request.base.sha }}'
          # The harness script must be the PR's copy even while the worktree sits
          # at base (where it may not exist yet); parked one level under the repo
          # root so its own root resolution still finds this repo.
          cp scripts/bench-instructions.sh target/bench-instructions-pr.sh
          git checkout -q "$base"
          cargo bench --locked -p allowlister-remote-plugin --bench engine -- --measurement-time 3 --save-baseline base
          BENCH_OUT="$PWD/target/bench-base" bash target/bench-instructions-pr.sh || true
          git checkout -q -
          critcmp base pr | tee target/bench/critcmp.txt
          if [ -s target/bench-base/instructions.tsv ]; then
            bash scripts/bench-instructions.sh report \
              target/bench-base/instructions.tsv target/bench/instructions.tsv \
              | tee target/bench/instructions-delta.md
          fi

      - name: Assemble report
        run: |
          set -euo pipefail
          report=target/bench/report.md
          {
            echo "## ⏱️ Performance report"
            echo
            echo "Commit \`${GITHUB_SHA::8}\` on \`ubuntu-latest\`. Timings are"
            echo "informational — shared-runner noise means treat small deltas with caution."
            echo
            echo "### End-to-end CLI latency (hyperfine)"
            echo
            cat target/bench/results.md
            echo
            echo "### Engine micro-benchmarks vs base (Criterion + critcmp)"
            echo
            if [ -s target/bench/critcmp.txt ]; then
              echo '```'
              cat target/bench/critcmp.txt
              echo '```'
            else
              echo "_No base comparison: the engine bench is not present on the base"
              echo "ref yet (expected on the PR that introduces it). Future PRs will"
              echo "show the regression delta here._"
            fi
            echo
            echo "### CLI instruction counts (cachegrind; deterministic)"
            echo
            if [ -s target/bench/instructions-delta.md ]; then
              cat target/bench/instructions-delta.md
            else
              cat target/bench/instructions.md
            fi
            echo
            echo "### Engine allocation counts (deterministic)"
            echo
            cat target/bench/allocs.md
          } > "$report"
          cat "$report" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            target/bench/results.json
            target/bench/results.md
            target/bench/critcmp.txt
            target/bench/instructions.tsv
            target/bench/instructions.md
            target/bench/instructions-delta.md
            target/bench/allocs.md
          if-no-files-found: warn

      # Same-repo PRs only: fork PRs carry a read-only token and cannot comment,
      # so they fall back to the job summary + artifact above.
      - name: Post sticky PR comment
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- allowlister-remote-perf -->';
            const body = `${marker}\n${fs.readFileSync('target/bench/report.md', 'utf8')}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  web:
    name: web PWA
    needs: changes
    if: needs.changes.outputs.web == 'true'
    # A single, consistent runner so the Lighthouse timings stay comparable; the
    # bundle-size numbers are deterministic regardless of host.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the PR base commit is available for the bundle-size
          # comparison.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build the PWA
        run: npx nx run web:build

      # Pure-function micro-benchmarks (the Criterion analogue): absolute numbers,
      # rendered to markdown from the JSON the run exports.
      - name: Micro-benchmarks (Vitest)
        run: |
          npx nx run web:bench
          node scripts/web-bench-report.mjs target/web-perf/bench.json \
            | tee target/web-perf/bench.md

      # Deterministic: the trustworthy delta layer (the cachegrind analogue).
      - name: Bundle size (deterministic)
        run: node scripts/web-bundle-size.mjs

      # Wall-clock and noisy (the hyperfine analogue); informational only. CI
      # ubuntu images ship Google Chrome, which chrome-launcher finds. Best
      # effort: a launch failure must not sink the deterministic layers above.
      - name: Lighthouse runtime audit
        continue-on-error: true
        run: node scripts/web-lighthouse.mjs

      # Best effort: the PR base may predate this suite (e.g. the PR that adds
      # it), so a failure here is expected and non-fatal — the job still reports
      # absolute numbers, just without a size delta. Reuses the head's installed
      # deps to build the base, avoiding a second `npm ci`.
      - name: Compare bundle size against PR base
        id: basecmp
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          set -euo pipefail
          base='${{ github.event.pull_request.base.sha }}'
          # The report script must be the PR's copy even while the worktree sits
          # at base (where it may not exist yet); parked one level under the repo
          # root so its own root resolution still finds this repo.
          cp scripts/web-bundle-size.mjs target/web-bundle-size-pr.mjs
          git checkout -q "$base"
          npx nx run web:build
          BUNDLE_OUT="$PWD/target/web-perf-base" node target/web-bundle-size-pr.mjs
          git checkout -q -
          node scripts/web-bundle-size.mjs report \
            target/web-perf-base/bundle-size.tsv target/web-perf/bundle-size.tsv \
            | tee target/web-perf/bundle-size-delta.md

      - name: Assemble report
        run: |
          set -euo pipefail
          report=target/web-perf/report.md
          {
            echo "## 🌐 PWA performance report"
            echo
            echo "Commit \`${GITHUB_SHA::8}\` on \`ubuntu-latest\`. Bundle size is"
            echo "deterministic; Lighthouse timings are informational — shared-runner"
            echo "noise means treat small deltas with caution."
            echo
            echo "### Client bundle size (gzip; deterministic)"
            echo
            if [ -s target/web-perf/bundle-size-delta.md ]; then
              cat target/web-perf/bundle-size-delta.md
            else
              cat target/web-perf/bundle-size.md
              echo
              echo "_No base comparison: the bundle-size report is not present on the"
              echo "base ref yet (expected on the PR that introduces it). Future PRs"
              echo "will show the size delta here._"
            fi
            echo
            echo "### Lighthouse runtime audit (informational)"
            echo
            if [ -s target/web-perf/lighthouse.md ]; then
              cat target/web-perf/lighthouse.md
            else
              echo "_Lighthouse did not produce a result this run (see the job log)._"
            fi
            echo
            echo "### Decision-path micro-benchmarks (Vitest)"
            echo
            cat target/web-perf/bench.md
          } > "$report"
          cat "$report" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw results
        uses: actions/upload-artifact@v4
        with:
          name: web-perf-results
          path: |
            target/web-perf/bench.json
            target/web-perf/bench.md
            target/web-perf/bundle-size.json
            target/web-perf/bundle-size.tsv
            target/web-perf/bundle-size.md
            target/web-perf/bundle-size-delta.md
            target/web-perf/lighthouse.json
            target/web-perf/lighthouse.md
          if-no-files-found: warn

      # Same-repo PRs only: fork PRs carry a read-only token and cannot comment,
      # so they fall back to the job summary + artifact above.
      - name: Post sticky PR comment
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- allowlister-remote-web-perf -->';
            const body = `${marker}\n${fs.readFileSync('target/web-perf/report.md', 'utf8')}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
