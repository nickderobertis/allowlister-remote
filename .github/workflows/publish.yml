name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-binary:
    name: build-binary (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: allowlister-remote-plugin
            artifact: allowlister-remote-plugin-linux-x64
          - platform: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            binary: allowlister-remote-plugin
            artifact: allowlister-remote-plugin-darwin-arm64
          - platform: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: allowlister-remote-plugin.exe
            artifact: allowlister-remote-plugin-win32-x64.exe
    steps:
      - uses: actions/checkout@v6
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build release binary
        shell: bash
        run: cargo build --release --target "${{ matrix.target }}" -p allowlister-remote-plugin
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist/artifacts
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/artifacts/${{ matrix.artifact }}"
          if [[ "${{ matrix.os }}" != windows-* ]]; then chmod +x "dist/artifacts/${{ matrix.artifact }}"; fi
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/artifacts/${{ matrix.artifact }}
          if-no-files-found: error

  github-release:
    runs-on: ubuntu-latest
    needs: build-binary
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/release-artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist/release-artifacts
          sha256sum allowlister-remote-plugin-* > SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/release-artifacts/allowlister-remote-plugin-*
            dist/release-artifacts/SHA256SUMS

  npm-publish:
    runs-on: ubuntu-latest
    needs: [build-binary, github-release]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist/release-artifacts
          merge-multiple: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Set npm package version from tag
        run: node scripts/set-npm-package-version.mjs "${GITHUB_REF_NAME#v}"
      - name: Stage npm package binaries
        run: npm run release:stage-npm -- dist/release-artifacts
      - name: Smoke-test packed npm package
        run: npm run release:smoke-npm
      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('packages/allowlister-remote-plugin/package.json', 'utf8')).version)")"
          if npm view "@nickderobertis/allowlister-remote-plugin@$version" version >/dev/null 2>&1; then
            echo "npm package $version already published"
            exit 0
          fi
          npm publish --workspace packages/allowlister-remote-plugin --access public --provenance
      - name: Smoke-test published npm package
        run: |
          version="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('packages/allowlister-remote-plugin/package.json', 'utf8')).version)")"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          for attempt in {1..12}; do
            if npm install --prefix "$tmp_dir/prefix" -g "@nickderobertis/allowlister-remote-plugin@$version"; then
              break
            fi
            sleep 10
          done
          test "$("$tmp_dir/prefix/bin/allowlister-remote-plugin" --version)" = "$version"
          printf '{"current_verdict":"allow","command":"git status","cwd":"/tmp"}' \
            | "$tmp_dir/prefix/bin/allowlister-remote-plugin" --server-url http://127.0.0.1:9 \
            | grep '"verdict":"defer"' >/dev/null
