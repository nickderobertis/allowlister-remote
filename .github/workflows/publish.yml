name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-binary:
    name: build-binary (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            # Static musl build: the published linux binaries link libc in, so
            # they carry no glibc version floor (run on Alpine/distroless/old
            # distros) and skip the dynamic loader entirely — the plugin is
            # spawned once per gated command, and dropping ld.so cuts the
            # no-network hot path ~75% (cachegrind). `ring` needs a musl C
            # compiler, installed below.
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            exe: ""
          - platform: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            exe: ""
          - platform: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            exe: .exe
    steps:
      - uses: actions/checkout@v6
      - name: Resolve plugin version from tag
        shell: bash
        # The crate Cargo.toml carries a 0.0.0 placeholder; the published binary's
        # version is the release tag, injected at compile time (option_env! in
        # main.rs) so `--version` matches the npm package version stamped from the
        # same tag. Set for every matrix leg.
        run: echo "ALLOWLISTER_REMOTE_PLUGIN_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install musl C toolchain
        # Only the linux-x64 (musl) build needs it; `ring` compiles C/asm against
        # musl libc. No-op for the macOS/Windows matrix legs.
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build release binaries
        shell: bash
        # Build the plugin, the daemon it auto-starts, and the broker for every
        # target. The daemon is the plugin's only transport to the broker on every
        # OS (a Unix socket on Unix, a named pipe on Windows), so it ships
        # everywhere; the broker is the WebSocket relay, shipped as a standalone
        # CLI via GitHub Releases (see scripts/install-broker.sh) rather than npm.
        # `CC_<target>` points `ring`'s `cc` build at musl-gcc when cross-building
        # the musl target; unused on the other targets.
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: |
          cargo build --release --target "${{ matrix.target }}" -p allowlister-remote-plugin
          cargo build --release --target "${{ matrix.target }}" -p allowlister-remote-daemon
          cargo build --release --target "${{ matrix.target }}" -p allowlister-remote-broker
      - name: Stage artifacts
        shell: bash
        # Name each artifact `<binary>-<platform>[.exe]` so release:stage-npm can
        # pick the plugin and daemon up by binary and platform. The broker is
        # staged the same way for the GitHub Release; stage-npm ignores it.
        run: |
          mkdir -p dist/artifacts
          binaries=(allowlister-remote-plugin allowlister-remote-daemon allowlister-remote-broker)
          for binary in "${binaries[@]}"; do
            artifact="${binary}-${{ matrix.platform }}${{ matrix.exe }}"
            cp "target/${{ matrix.target }}/release/${binary}${{ matrix.exe }}" "dist/artifacts/${artifact}"
            if [[ "${{ matrix.os }}" != windows-* ]]; then chmod +x "dist/artifacts/${artifact}"; fi
          done
      - uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.platform }}
          path: dist/artifacts/*
          if-no-files-found: error

  github-release:
    runs-on: ubuntu-latest
    needs: build-binary
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/release-artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist/release-artifacts
          sha256sum allowlister-remote-plugin-* allowlister-remote-daemon-* allowlister-remote-broker-* > SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/release-artifacts/allowlister-remote-plugin-*
            dist/release-artifacts/allowlister-remote-daemon-*
            dist/release-artifacts/allowlister-remote-broker-*
            dist/release-artifacts/SHA256SUMS

  npm-publish:
    runs-on: ubuntu-latest
    needs: [build-binary, github-release]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist/release-artifacts
          merge-multiple: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Set npm package versions from tag
        run: node scripts/set-npm-package-version.mjs "${GITHUB_REF_NAME#v}"
      - name: Stage npm package binaries
        run: npm run release:stage-npm -- dist/release-artifacts
      - name: Smoke-test packed npm package
        run: npm run release:smoke-npm
      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          publish_pkg() {
            local dir="$1"
            local name version
            name="$(node -e "console.log(require('./packages/$dir/package.json').name)")"
            version="$(node -e "console.log(require('./packages/$dir/package.json').version)")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already published"
              return 0
            fi
            npm publish "./packages/$dir" --access public --provenance
          }
          # Platform packages must publish before the parent that depends on them.
          publish_pkg allowlister-remote-plugin-darwin-arm64
          publish_pkg allowlister-remote-plugin-linux-x64
          publish_pkg allowlister-remote-plugin-win32-x64
          publish_pkg allowlister-remote-plugin
      - name: Smoke-test published npm package
        run: |
          version="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('packages/allowlister-remote-plugin/package.json', 'utf8')).version)")"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          cmd="$tmp_dir/prefix/bin/allowlister-remote-plugin"
          # A fresh release registers the brand-new per-platform packages a little
          # after the parent (which already exists), and npm silently skips an
          # unresolved OPTIONAL dependency — so the parent can install before its
          # matching platform package has propagated. Retry until the install
          # actually yields a working binary (`--version` needs the native binary),
          # not merely until the parent resolves.
          installed=0
          for attempt in {1..30}; do
            rm -rf "$tmp_dir/prefix"
            if npm install --prefer-online --prefix "$tmp_dir/prefix" -g "@nickderobertis/allowlister-remote-plugin@$version" >/dev/null 2>&1 \
              && [[ "$("$cmd" --version 2>/dev/null)" == "$version" ]]; then
              installed=1
              break
            fi
            echo "attempt $attempt: parent or per-platform package not fully propagated yet; retrying"
            sleep 10
          done
          if [[ "$installed" -ne 1 ]]; then
            echo "published npm package $version did not become fully installable" >&2
            exit 1
          fi
          # A static allow defers without any transport, so this needs no daemon
          # or broker — it confirms the native binary runs and answers on stdout.
          printf '{"current_verdict":"allow","command":"git status","cwd":"/tmp"}' \
            | "$cmd" \
            | grep '"verdict":"defer"' >/dev/null
          # Confirm the install linked the native binary directly onto PATH (no
          # Node launcher); the launcher fallback would start with a `#!` shebang.
          resolved="$(node -e 'console.log(require("node:fs").realpathSync(process.argv[1]))' "$cmd")"
          if [[ "$(head -c 2 "$resolved")" == "#!" ]]; then
            echo "published command on PATH is the JS launcher, expected the native binary" >&2
            exit 1
          fi
          echo "published command resolves directly to the native binary"
          # The auto-started daemon must ship as a sibling of the RESOLVED plugin
          # binary (current_exe() follows the bin symlink), so the plugin's
          # `resolve_daemon_bin` sibling lookup finds it.
          daemon="$(dirname "$resolved")/allowlister-remote-daemon"
          if [[ ! -x "$daemon" ]]; then
            echo "published package is missing the daemon binary next to the plugin" >&2
            exit 1
          fi
          [[ "$("$daemon" --version)" == "$version" ]]
          echo "published daemon binary resolves next to the plugin"

  web-publish:
    # The PWA is a fully static export with no server of its own, so it ships as
    # its own npm package (@nickderobertis/allowlister-remote-web): a tiny static
    # server plus the prebuilt `out/` bundle. It has no native binaries and no
    # dependency on the plugin packages, so it builds and publishes independently
    # of the binary jobs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Build the static PWA export
        run: npx nx run web:build
      - name: Stage the PWA bundle and version from the tag
        run: npm run release:stage-web -- "${GITHUB_REF_NAME#v}"
      - name: Smoke-test the packed web package
        run: npm run release:smoke-web
      - name: Publish the web package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          name="$(node -e "console.log(require('./packages/allowlister-remote-web/package.json').name)")"
          version="$(node -e "console.log(require('./packages/allowlister-remote-web/package.json').version)")"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "$name@$version already published"
          else
            npm publish "./packages/allowlister-remote-web" --access public --provenance
          fi
