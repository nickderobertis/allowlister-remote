<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Fontconfig override for deterministic, CPU-independent screenshot capture.

  Both the CI capture (visual-docs.yml) and the local pre-push guard
  (.githooks/pre-push) copy this file to /etc/fonts/local.conf inside the
  Playwright container before capturing, so local bytes equal CI bytes. It must
  be local.conf (the high priority user override); a conf.d drop-in is shadowed
  by the container's own config and silently no-ops.

  NOTE: XML comments cannot contain a double hyphen, so this text avoids it.

  Why hintfull, and why here instead of the Chromium font render hinting flag:
  that flag is inert in the Playwright/Linux container because FreeType hinting
  is governed by fontconfig, whose default here is hintSLIGHT. Slight hinting
  leaves glyph stems on fractional sub pixel positions, so their anti aliased
  edges round differently across CPU microarchitectures (an Intel baseline
  drifted from an AMD EPYC runner by about 9 px / 1 LSB on the densest text
  shot, tool-json). Full hinting snaps stems to the integer pixel grid, the
  change that aims to remove those fractional edges. Keep this minimal: adding
  antialias or rgba or lcdfilter edits is unnecessary noise.
-->
<fontconfig>
  <match target="font">
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintfull</const></edit>
  </match>
</fontconfig>
