<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Visual docs</title>
<style>body{font-family:system-ui,sans-serif;margin:2rem;color:#222}section.shot{margin-bottom:2.5rem}section.shot[hidden]{display:none}h2{margin-bottom:.5rem}.toggles{display:flex;flex-wrap:wrap;gap:1rem;margin:0 0 1.5rem;position:sticky;top:0;background:#fff;padding:.75rem 0;z-index:1}.toggle{display:flex;align-items:center;gap:.4rem}.dim-label{font-size:.8rem;color:#555}.toggle button{font:inherit;font-size:.8rem;padding:.15rem .6rem;border:1px solid #bbb;background:#f6f6f6;border-radius:999px;cursor:pointer}.toggle button.active{background:#222;color:#fff;border-color:#222}.variants img{max-width:100%;height:auto;border:1px solid #ddd;border-radius:4px}.variant[hidden]{display:none}</style>
</head>
<body>
<h1>Visual docs</h1>
<div class="toggles"><div class="toggle" data-dim="viewport"><span class="dim-label">Viewport</span><button type="button" data-val="desktop" class="active">desktop</button><button type="button" data-val="mobile">mobile</button></div><div class="toggle" data-dim="theme"><span class="dim-label">Theme</span><button type="button" data-val="dark" class="active">dark</button><button type="button" data-val="light">light</button></div></div>
<section class="shot"><h2>empty-state</h2>
<div class="variants"><img class="variant" data-variant="theme=dark;viewport=desktop" loading="lazy" src="empty-state-desktop-dark.png" alt="empty-state [theme=dark, viewport=desktop]"><img class="variant" data-variant="theme=dark;viewport=mobile" loading="lazy" src="empty-state-mobile-dark.png" alt="empty-state [theme=dark, viewport=mobile]" hidden><img class="variant" data-variant="theme=light;viewport=desktop" loading="lazy" src="empty-state-desktop-light.png" alt="empty-state [theme=light, viewport=desktop]" hidden><img class="variant" data-variant="theme=light;viewport=mobile" loading="lazy" src="empty-state-mobile-light.png" alt="empty-state [theme=light, viewport=mobile]" hidden></div></section>
<section class="shot"><h2>inbox</h2>
<div class="variants"><img class="variant" data-variant="theme=dark;viewport=desktop" loading="lazy" src="inbox-desktop-dark.png" alt="inbox [theme=dark, viewport=desktop]"><img class="variant" data-variant="theme=dark;viewport=mobile" loading="lazy" src="inbox-mobile-dark.png" alt="inbox [theme=dark, viewport=mobile]" hidden><img class="variant" data-variant="theme=light;viewport=desktop" loading="lazy" src="inbox-desktop-light.png" alt="inbox [theme=light, viewport=desktop]" hidden><img class="variant" data-variant="theme=light;viewport=mobile" loading="lazy" src="inbox-mobile-light.png" alt="inbox [theme=light, viewport=mobile]" hidden></div></section>
<section class="shot"><h2>shell-oneoff</h2>
<div class="variants"><img class="variant" data-variant="theme=dark;viewport=desktop" loading="lazy" src="shell-oneoff-desktop-dark.png" alt="shell-oneoff [theme=dark, viewport=desktop]"><img class="variant" data-variant="theme=dark;viewport=mobile" loading="lazy" src="shell-oneoff-mobile-dark.png" alt="shell-oneoff [theme=dark, viewport=mobile]" hidden><img class="variant" data-variant="theme=light;viewport=desktop" loading="lazy" src="shell-oneoff-desktop-light.png" alt="shell-oneoff [theme=light, viewport=desktop]" hidden><img class="variant" data-variant="theme=light;viewport=mobile" loading="lazy" src="shell-oneoff-mobile-light.png" alt="shell-oneoff [theme=light, viewport=mobile]" hidden></div></section>
<section class="shot"><h2>shell-script</h2>
<div class="variants"><img class="variant" data-variant="theme=dark;viewport=desktop" loading="lazy" src="shell-script-desktop-dark.png" alt="shell-script [theme=dark, viewport=desktop]"><img class="variant" data-variant="theme=dark;viewport=mobile" loading="lazy" src="shell-script-mobile-dark.png" alt="shell-script [theme=dark, viewport=mobile]" hidden><img class="variant" data-variant="theme=light;viewport=desktop" loading="lazy" src="shell-script-desktop-light.png" alt="shell-script [theme=light, viewport=desktop]" hidden><img class="variant" data-variant="theme=light;viewport=mobile" loading="lazy" src="shell-script-mobile-light.png" alt="shell-script [theme=light, viewport=mobile]" hidden></div></section>
<section class="shot"><h2>terminal-script</h2>
<div class="variants"><img class="variant" data-variant="theme=dark" loading="lazy" src="terminal-script-dark.svg" alt="terminal-script [theme=dark]"><img class="variant" data-variant="theme=light" loading="lazy" src="terminal-script-light.svg" alt="terminal-script [theme=light]" hidden></div></section>
<section class="shot"><h2>terminal-shell</h2>
<div class="variants"><img class="variant" data-variant="theme=dark" loading="lazy" src="terminal-shell-dark.svg" alt="terminal-shell [theme=dark]"><img class="variant" data-variant="theme=light" loading="lazy" src="terminal-shell-light.svg" alt="terminal-shell [theme=light]" hidden></div></section>
<section class="shot"><h2>terminal-tool</h2>
<div class="variants"><img class="variant" data-variant="theme=dark" loading="lazy" src="terminal-tool-dark.svg" alt="terminal-tool [theme=dark]"><img class="variant" data-variant="theme=light" loading="lazy" src="terminal-tool-light.svg" alt="terminal-tool [theme=light]" hidden></div></section>
<section class="shot"><h2>tool-capability</h2>
<div class="variants"><img class="variant" data-variant="theme=dark;viewport=desktop" loading="lazy" src="tool-capability-desktop-dark.png" alt="tool-capability [theme=dark, viewport=desktop]"><img class="variant" data-variant="theme=dark;viewport=mobile" loading="lazy" src="tool-capability-mobile-dark.png" alt="tool-capability [theme=dark, viewport=mobile]" hidden><img class="variant" data-variant="theme=light;viewport=desktop" loading="lazy" src="tool-capability-desktop-light.png" alt="tool-capability [theme=light, viewport=desktop]" hidden><img class="variant" data-variant="theme=light;viewport=mobile" loading="lazy" src="tool-capability-mobile-light.png" alt="tool-capability [theme=light, viewport=mobile]" hidden></div></section>
<section class="shot"><h2>tool-formatted</h2>
<div class="variants"><img class="variant" data-variant="theme=dark;viewport=desktop" loading="lazy" src="tool-formatted-desktop-dark.png" alt="tool-formatted [theme=dark, viewport=desktop]"><img class="variant" data-variant="theme=dark;viewport=mobile" loading="lazy" src="tool-formatted-mobile-dark.png" alt="tool-formatted [theme=dark, viewport=mobile]" hidden><img class="variant" data-variant="theme=light;viewport=desktop" loading="lazy" src="tool-formatted-desktop-light.png" alt="tool-formatted [theme=light, viewport=desktop]" hidden><img class="variant" data-variant="theme=light;viewport=mobile" loading="lazy" src="tool-formatted-mobile-light.png" alt="tool-formatted [theme=light, viewport=mobile]" hidden></div></section>
<section class="shot"><h2>tool-json</h2>
<div class="variants"><img class="variant" data-variant="theme=dark;viewport=desktop" loading="lazy" src="tool-json-desktop-dark.png" alt="tool-json [theme=dark, viewport=desktop]"><img class="variant" data-variant="theme=dark;viewport=mobile" loading="lazy" src="tool-json-mobile-dark.png" alt="tool-json [theme=dark, viewport=mobile]" hidden><img class="variant" data-variant="theme=light;viewport=desktop" loading="lazy" src="tool-json-desktop-light.png" alt="tool-json [theme=light, viewport=desktop]" hidden><img class="variant" data-variant="theme=light;viewport=mobile" loading="lazy" src="tool-json-mobile-light.png" alt="tool-json [theme=light, viewport=mobile]" hidden></div></section>
<script>const bar=document.querySelector('.toggles');if(bar){const sel={};for(const t of bar.querySelectorAll('.toggle')){const a=t.querySelector('button.active')||t.querySelector('button');if(a)sel[t.dataset.dim]=a.dataset.val;}const parse=s=>{const o={};if(s)for(const p of s.split(';')){const i=p.indexOf('=');o[p.slice(0,i)]=p.slice(i+1);}return o;};const match=v=>{for(const k in v)if(sel[k]!==v[k])return false;return true;};const apply=()=>{for(const sec of document.querySelectorAll('.shot')){const imgs=sec.querySelectorAll('.variant');if(!imgs.length)continue;let any=false;for(const img of imgs){const ok=match(parse(img.dataset.variant));img.hidden=!ok;if(ok)any=true;}sec.hidden=!any;}for(const b of bar.querySelectorAll('.toggle button'))b.classList.toggle('active',sel[b.parentElement.dataset.dim]===b.dataset.val);};for(const b of bar.querySelectorAll('.toggle button'))b.addEventListener('click',()=>{sel[b.parentElement.dataset.dim]=b.dataset.val;apply();});apply();}</script>
</body>
</html>
